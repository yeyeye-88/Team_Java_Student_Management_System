  # 数据源配置（连接MySQL）
  datasource:
    url: jdbc:mysql://202.194.14.120:3306/java_3_10?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: java_3_10
    password: JavaP310@
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA配置（操作数据库的ORM框架）
  jpa:
    hibernate:
      ddl-auto: update  # 自动更新表结构，不会删除数据
    show-sql: true      # 在控制台打印执行的SQL语句，方便调试
    properties:
      hibernate:
        format_sql: true  # 让打印的SQL更美观易读
        dialect: org.hibernate.dialect.MySQLDialect  # 指定MySQL方言

